<!DOCTYPE html>
<html lang="ja">

<title>PayOFF - Personal Finance Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;font-family:'DM Sans','Helvetica Neue',sans-serif;}
#loading-msg{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#00c9a7;font-size:14px;}
#error-msg{display:none;align-items:center;justify-content:center;min-height:100vh;color:#ff5a6e;font-size:14px;padding:20px;text-align:center;flex-direction:column;gap:12px;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:4px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.fade-up{animation:fadeUp .45s ease both}.fade-up-1{animation-delay:.05s}.fade-up-2{animation-delay:.1s}.fade-up-3{animation-delay:.15s}.fade-up-4{animation-delay:.2s}
.payoff-app{font-family:'DM Sans','Helvetica Neue',sans-serif;background:#f0f4f8;min-height:100vh;color:#0a1628;font-size:14px;max-width:520px;margin:0 auto;padding-bottom:80px;position:relative;overflow-x:hidden;}
.payoff-app::before{content:'';position:fixed;top:-120px;right:-120px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,201,167,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
.payoff-app::after{content:'';position:fixed;bottom:-80px;left:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(0,87,255,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
.header-gradient{background:linear-gradient(135deg,#00c9a7 0%,#0057ff 50%,#7c3aed 100%);background-size:200% 200%;animation:gradientMove 6s ease infinite;padding:28px 20px 20px;color:#fff;position:relative;z-index:1;border-radius:0 0 24px 24px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,87,255,0.15);}
.header-gradient h1{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;letter-spacing:3px;margin:0;text-shadow:0 2px 12px rgba(0,0,0,0.15);}
.header-gradient p{font-size:11px;opacity:.8;letter-spacing:1.5px;margin-top:2px;font-weight:500;}
.nav-pills{display:flex;gap:6px;padding:0 16px 12px;position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#f0f4f8 60%,transparent);padding-top:8px;}
.nav-pill{flex:1;padding:10px 0;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif;}
.nav-pill.active{background:linear-gradient(135deg,#00c9a7,#0057ff);color:#fff;box-shadow:0 8px 32px rgba(0,201,167,0.18);}
.nav-pill:not(.active){background:#fff;color:#5a6a7e;border:1px solid rgba(0,30,60,0.07);}
.glass-card{background:rgba(255,255,255,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(0,30,60,0.07);border-radius:16px;padding:18px;margin:0 16px 14px;box-shadow:0 1px 3px rgba(0,30,80,0.06),0 8px 24px rgba(0,30,80,0.04);position:relative;z-index:1;}
.card-title{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:#0a1628;margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:0.3px;}
.card-title .dot{width:6px;height:6px;border-radius:50%;background:#00c9a7;}
.input-field{width:100%;padding:11px 14px;border:1.5px solid rgba(0,30,60,0.07);border-radius:10px;background:#fff;color:#0a1628;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
.input-field:focus{border-color:#00c9a7;box-shadow:0 0 0 3px rgba(0,201,167,0.1);}
.input-field::placeholder{color:#94a3b8;}
select.input-field{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2394a3b8' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;}
.label{font-size:11px;color:#5a6a7e;margin-bottom:5px;display:block;font-weight:600;letter-spacing:0.3px;}
.btn-primary{padding:11px 24px;border:none;border-radius:10px;background:linear-gradient(135deg,#00c9a7,#00a78e);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 24px rgba(0,201,167,0.12);transition:all .2s;}
.btn-primary:hover{box-shadow:0 8px 32px rgba(0,201,167,0.18);transform:translateY(-1px);}
.btn-secondary{padding:8px 16px;border:1.5px solid rgba(0,30,60,0.07);border-radius:10px;background:#fff;color:#5a6a7e;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-secondary:hover{border-color:#00c9a7;color:#00c9a7;}
.stat-pill{background:#fff;border:1px solid rgba(0,30,60,0.07);border-radius:12px;padding:14px;text-align:center;}
.stat-pill .stat-label{font-size:10px;color:#94a3b8;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.stat-pill .stat-value{font-size:17px;font-weight:800;font-family:'Outfit',sans-serif;margin-top:4px;font-feature-settings:'tnum';}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(0,30,60,0.07);}.list-row:last-child{border-bottom:none;}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;}.repay-badge{background:rgba(255,159,28,0.1);color:#ff9f1c;}
.progress-track{height:6px;border-radius:3px;background:#e4eaf1;overflow:hidden;}.progress-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.22,1,.36,1);}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,22,40,0.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal-box{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:420px;box-shadow:0 16px 48px rgba(0,30,80,0.15);animation:fadeUp .3s ease;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:#0a1628;}
.modal-close{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer;padding:4px 8px;border-radius:6px;}.modal-close:hover{background:#e4eaf1;color:#0a1628;}
.empty-state{text-align:center;padding:28px 0;color:#94a3b8;font-size:12px;}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;color:#94a3b8;font-size:14px;transition:all .15s;}.icon-btn:hover{background:#e4eaf1;color:#0a1628;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.flex-row{display:flex;gap:8px;align-items:center;}.flex-col{display:flex;flex-direction:column;gap:10px;}
.total-banner{margin:0 16px 14px;padding:16px 20px;border-radius:16px;position:relative;z-index:1;}
.total-banner.assets{background:linear-gradient(135deg,rgba(0,201,167,0.08),rgba(0,87,255,0.06));border:1px solid rgba(0,201,167,0.2);}
.total-banner.debt{background:linear-gradient(135deg,rgba(255,90,110,0.06),rgba(255,159,28,0.04));border:1px solid rgba(255,90,110,0.15);}
.tab-toggle{display:flex;gap:4px;padding:4px;background:#e4eaf1;border-radius:10px;margin:0 16px 12px;}
.tab-toggle button{flex:1;padding:8px 0;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.tab-toggle button.active{background:#fff;color:#0a1628;box-shadow:0 1px 4px rgba(0,30,80,0.08);}
.tab-toggle button:not(.active){background:transparent;color:#94a3b8;}
.asset-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:#f0f4f8;}
.debt-card-inner{background:linear-gradient(135deg,rgba(0,201,167,0.03),rgba(0,87,255,0.02));border:1px solid rgba(0,30,60,0.07);border-radius:12px;padding:14px;margin-top:10px;}
</style>
</head>
<body>
<div id="loading-msg">読み込み中...</div>
<div id="error-msg"><div>⚠️ ライブラリの読み込みに失敗しました</div><div style="font-size:12px">ページをリロードしてください</div></div>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>

<script type="text/babel">
document.getElementById('loading-msg').style.display = 'none';

var useMemo = React.useMemo;

var ASSETS = [
  {key:"cash",label:"\u5C0F\u53E3",icon:"\uD83D\uDCB5"},
  {key:"rakuten",label:"\u697D\u5929\u9280\u884C",icon:"\uD83C\uDFE6"},

];
var COLORS = ["#00c9a7","#0057ff","#7c3aed","#ff9f1c","#ff5a6e","#06b6d4","#8b5cf6","#f59e0b","#ec4899","#14b8a6"];

function fmt(n){return (n==null||isNaN(n))?"0":Number(n).toLocaleString("ja-JP");}
function fmtD(d){if(!d)return"";var t=new Date(d);return t.getFullYear()+"/"+String(t.getMonth()+1).padStart(2,"0")+"/"+String(t.getDate()).padStart(2,"0");}
function mKey(d){var t=new Date(d);return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0");}
function today(){return new Date().toISOString().slice(0,10);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function ld(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function calcPO(bal,mp,ar){if(mp<=0||bal<=0)return null;var mr=ar/100/12;var rem=bal;var mo=0;while(rem>0&&mo<600){var interest=rem*mr;var principal=mp-interest;if(principal<=0)return null;rem-=principal;mo++;}var d=new Date();d.setMonth(d.getMonth()+mo);return d.toISOString().slice(0,10);}
function findAsset(k){for(var i=0;i<ASSETS.length;i++){if(ASSETS[i].key===k)return ASSETS[i];}return{};}

function Modal(props){
  if(!props.open)return null;
  return(
    <div className="modal-overlay" onClick={props.onClose}>
      <div className="modal-box" onClick={function(e){e.stopPropagation();}}>
        <div className="modal-header">
          <span className="modal-title">{props.title}</span>
          <button className="modal-close" onClick={props.onClose}>{"\u2715"}</button>
        </div>
        {props.children}
      </div>
    </div>
  );
}

function BudgetSection(props){
  var expenses=props.expenses,setExpenses=props.setExpenses,incomes=props.incomes,setIncomes=props.setIncomes,assets=props.assets,setAssets=props.setAssets;

  var _ev=s(""),editVal=_ev[0],setEditVal=_ev[1];

  function addExp(){if(!expItem||!expAmt)return;var a=Number(expAmt);var n={};n[expAs]=(assets[expAs]||0)-a;setExpenses([{id:uid(),item:expItem,amount:a,date:expDate,asset:expAs}].concat(expenses));setAssets(Object.assign({},assets,n));setExpItem("");setExpAmt("");}
  function addInc(){if(!incSrc||!incAmt)return;var a=Number(incAmt);var n={};n[incAs]=(assets[incAs]||0)+a;setIncomes([{id:uid(),source:incSrc,amount:a,date:incDate,asset:incAs}].concat(incomes));setAssets(Object.assign({},assets,n));setIncSrc("");setIncAmt("");}
  function delE(e){var n={};n[e.asset]=(assets[e.asset]||0)+e.amount;setExpenses(expenses.filter(function(x){return x.id!==e.id;}));setAssets(Object.assign({},assets,n));}
  function delI(i){var n={};n[i.asset]=(assets[i.asset]||0)-i.amount;setIncomes(incomes.filter(function(x){return x.id!==i.id;}));setAssets(Object.assign({},assets,n));}
  function saveAs(){if(editAs==null)return;var n={};n[editAs]=Number(editVal)||0;setAssets(Object.assign({},assets,n));setEditAs(null);}

  var tot=ASSETS.reduce(function(s,a){return s+(assets[a.key]||0);},0);

        );})):(incomes.length===0?<div className="empty-state">収入の記録がありません</div>:incomes.slice(0,20).map(function(i){return(
          <div className="list-row" key={i.id}><div><div style={{fontSize:13,fontWeight:600}}>{i.source}</div><div style={{fontSize:10,color:TXTM}}>{fmtD(i.date)} ・ {findAsset(i.asset).label}</div></div><div className="flex-row"><span style={{fontSize:14,fontWeight:700,fontFamily:"'Outfit',sans-serif",color:P}}>+{YEN}{fmt(i.amount)}</span><button className="icon-btn" onClick={function(){delI(i);}}>✕</button></div></div>
        );}))}
      </div>
    </div>
  );
}
